name: PR Accepted Deployment
run-name: PR from ${{ github.actor }} accepted - triggered a ${{ github.event_name }}

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write  # required for OIDC token exchange with AWS

jobs:
  run-snowflake-dbt-job:
    name: "Run on Accepted PR"
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: dbt-sf-cicd
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update ECS task definition with new image
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${{ secrets.ECS_TASK_DEFINITION }} --query 'taskDefinition' --output json)
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$IMAGE" '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> $GITHUB_ENV

      - name: Run dbt on ECS Fargate
        run: |
          cat > /tmp/overrides.json <<EOF
          {
            "containerOverrides": [{
              "name": "dbt-sf-cicd",
              "environment": [
                {"name": "SNOWFLAKE_ACCOUNT",   "value": "${{ secrets.SNOWFLAKE_ACCOUNT }}"},
                {"name": "SNOWFLAKE_USER",      "value": "${{ secrets.SNOWFLAKE_USER }}"},
                {"name": "SNOWFLAKE_PASSWORD",  "value": "${{ secrets.SNOWFLAKE_PASSWORD }}"},
                {"name": "SNOWFLAKE_DATABASE",  "value": "${{ secrets.SNOWFLAKE_DATABASE }}"},
                {"name": "SNOWFLAKE_SCHEMA",    "value": "${{ secrets.SNOWFLAKE_SCHEMA }}"},
                {"name": "DBT_OBJECT_NAME",     "value": "media_dataops_dbt_object_gh_action"},
                {"name": "DBT_TARGET",          "value": "prod"},
                {"name": "RUN_TESTS",           "value": "false"}
              ]
            }]
          }
          EOF
          aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --task-definition $TASK_DEF_ARN \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}],assignPublicIp=ENABLED}" \
            --overrides file:///tmp/overrides.json \
            --query 'tasks[0].taskArn' --output text
