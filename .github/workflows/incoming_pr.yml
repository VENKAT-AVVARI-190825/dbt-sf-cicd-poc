name: Incoming PR
run-name: PR opened by ${{ github.actor }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read
  id-token: write  # required for OIDC token exchange with AWS

jobs:
  run-snowflake-test-dbt-job:
    name: "Run on Incoming PR"
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: dbt-sf-cicd
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Run dbt on ECS Fargate
        run: |
          aws ecs run-task \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}],assignPublicIp=ENABLED}" \
            --overrides "{
              \"containerOverrides\": [{
                \"name\": \"dbt-sf-cicd\",
                \"image\": \"$IMAGE\",
                \"environment\": [
                  {\"name\": \"SNOWFLAKE_ACCOUNT\",   \"value\": \"${{ secrets.SNOWFLAKE_ACCOUNT }}\"},
                  {\"name\": \"SNOWFLAKE_USER\",      \"value\": \"${{ secrets.SNOWFLAKE_USER }}\"},
                  {\"name\": \"SNOWFLAKE_PASSWORD\",  \"value\": \"${{ secrets.SNOWFLAKE_PASSWORD }}\"},
                  {\"name\": \"SNOWFLAKE_DATABASE\",  \"value\": \"${{ secrets.SNOWFLAKE_DATABASE }}\"},
                  {\"name\": \"SNOWFLAKE_SCHEMA\",    \"value\": \"${{ secrets.SNOWFLAKE_SCHEMA }}\"},
                  {\"name\": \"DBT_OBJECT_NAME\",     \"value\": \"media_dataops_TESTER_dbt_object_gh_action\"},
                  {\"name\": \"DBT_TARGET\",          \"value\": \"dev\"},
                  {\"name\": \"RUN_TESTS\",           \"value\": \"true\"}
                ]
              }]
            }" \
            --query 'tasks[0].taskArn' --output text
